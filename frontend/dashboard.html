<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Evofit - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="protegerPagina(); carregarDashboard();">
  <div class="container">
    <div class="topo">
      <div>
        <h1>Evofit</h1>
        <p id="usuarioLogado">Bem-vindo!</p>
      </div>

      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>

    <div class="menu">
      <a href="perfil.html">Perfil</a>
      <a href="disponibilidade.html">Disponibilidade</a>
      <a href="alunos.html">Alunos</a>
      <a href="treinos.html">Treinos</a>
      <a href="agenda.html">Agenda</a>
      <a href="acompanhamento.html">Acompanhamento</a>
      <a href="acesso-aluno.html">Acesso do Aluno</a>
    </div>

    <div class="grid-dashboard">
      <div class="card status-card">
        <h2 id="totalAlunos">0</h2>
        <p>Alunos cadastrados</p>
      </div>

      <div class="card status-card">
        <h2 id="totalTreinos">0</h2>
        <p>Treinos criados</p>
      </div>

      <div class="card status-card">
        <h2 id="totalAgenda">0</h2>
        <p>Aulas agendadas</p>
      </div>
    </div>

    <div class="card">
      <h2>Resumo do sistema</h2>
      <p>Use o menu acima para cadastrar alunos, montar treinos e organizar sua agenda de aulas.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
