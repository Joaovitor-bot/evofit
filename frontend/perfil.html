<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Evofit - Perfil do Personal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="protegerPagina(); listarPerfilPersonal();">
  <div class="container">
    <h1>Perfil do Personal Trainer</h1>

    <div class="menu">
      <a href="dashboard.html">Dashboard</a>
      <a href="alunos.html">Alunos</a>
      <a href="treinos.html">Treinos</a>
      <a href="agenda.html">Agenda</a>
    </div>

    <div class="card">
      <h2>Cadastrar perfil profissional</h2>

      <input type="text" id="perfil_nome" placeholder="Nome completo">
      <input type="text" id="perfil_foto" placeholder="URL da foto">
      <input type="text" id="perfil_cref" placeholder="Registro no CREF">
      <input type="text" id="perfil_telefone" placeholder="Telefone de contato">
      <textarea id="perfil_biografia" placeholder="Biografia"></textarea>
      <textarea id="perfil_especialidades" placeholder="Especialidades"></textarea>

      <button onclick="cadastrarPerfilPersonal()">Salvar perfil</button>
    </div>

    <div class="card">
      <h2>Perfil cadastrado</h2>
      <div id="listaPerfilPersonal"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
