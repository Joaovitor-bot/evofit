<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <title>Evofit - Cadastro</title>

</head>
<body>

    <div class="card">

      <p>Já tem conta?</p>
      <a href="index.html">Fazer login</a>
    </div>
  </div>

  <script src="script.js"></script>

</html>
