<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Evofit - Alunos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="listarAlunos()">
  <div class="container">
    <h1>Alunos</h1>

    <div class="menu">
      <a href="dashboard.html">Dashboard</a>
      <a href="treinos.html">Treinos</a>
      <a href="agenda.html">Agenda</a>
    </div>

    <div class="card">
      <h2>Cadastrar aluno</h2>

      <input type="hidden" id="aluno_id_edicao">

      <input type="text" id="aluno_nome" placeholder="Nome do aluno">
      <input type="date" id="aluno_data_nascimento">
      <input type="text" id="aluno_whatsapp" placeholder="WhatsApp">
      <input type="email" id="aluno_email" placeholder="E-mail">

      <select id="aluno_genero">
        <option value="">Selecione o gênero</option>
        <option value="Feminino">Feminino</option>
        <option value="Masculino">Masculino</option>
        <option value="Outro">Outro</option>
      </select>

      <input type="text" id="aluno_contato_emergencia" placeholder="Contato de emergência">

      <button id="btnAluno" onclick="cadastrarAluno()">Cadastrar aluno</button>

    </div>

    <div class="card">
      <h2>Lista de alunos</h2>
      <div id="listaAlunos"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
