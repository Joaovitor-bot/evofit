<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Evofit - Disponibilidade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="protegerPagina(); listarDisponibilidade();">
  <div class="container">
    <h1>Disponibilidade do Personal</h1>

    <div class="menu">
      <a href="dashboard.html">Dashboard</a>
      <a href="perfil.html">Perfil</a>
      <a href="alunos.html">Alunos</a>
      <a href="treinos.html">Treinos</a>
      <a href="agenda.html">Agenda</a>
    </div>

    <div class="card">
      <h2>Cadastrar horário de atendimento</h2>

      <select id="dia_semana">
        <option value="">Selecione o dia</option>
        <option value="Segunda-feira">Segunda-feira</option>
        <option value="Terça-feira">Terça-feira</option>
        <option value="Quarta-feira">Quarta-feira</option>
        <option value="Quinta-feira">Quinta-feira</option>
        <option value="Sexta-feira">Sexta-feira</option>
        <option value="Sábado">Sábado</option>
        <option value="Domingo">Domingo</option>
      </select>

      <label>Horário inicial</label>
      <input type="time" id="horario_inicio">

      <label>Horário final</label>
      <input type="time" id="horario_fim">

      <button onclick="cadastrarDisponibilidade()">Salvar disponibilidade</button>
    </div>

    <div class="card">
      <h2>Horários cadastrados</h2>
      <div id="listaDisponibilidade"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
