<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Evofit</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container">
    <h1>Bem-vindo</h1>
    <p>Sistema de gestão para personal trainers</p>

    <ion-item>
      <ion-label position="floating">E-mail</ion-label>
      <ion-input type="email" [(ngModel)]="email"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Senha</ion-label>
      <ion-input type="password" [(ngModel)]="senha"></ion-input>
    </ion-item>

    <ion-button expand="block" class="ion-margin-top" (click)="entrar()">
      Entrar
    </ion-button>

    <ion-button expand="block" fill="clear" routerLink="/cadastro">
      Criar conta
    </ion-button>

    <ion-text color="danger" *ngIf="erro">
      <p>{{ erro }}</p>
    </ion-text>
  </div>
</ion-content>
