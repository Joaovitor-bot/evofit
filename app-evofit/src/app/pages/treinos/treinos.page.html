<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Treinos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-button expand="block" (click)="abrirForm()">Novo Treino</ion-button>

  <div *ngIf="mostrarForm">
    <ion-item>
      <ion-label position="floating">Título</ion-label>
      <ion-input [(ngModel)]="atualTreino.titulo"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Objetivo</ion-label>
      <ion-input [(ngModel)]="atualTreino.objetivo"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Exercícios</ion-label>
      <ion-input [(ngModel)]="atualTreino.exercicios"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Observações</ion-label>
      <ion-input [(ngModel)]="atualTreino.observacoes"></ion-input>
    </ion-item>

    <ion-button expand="block" (click)="salvarTreino()">Salvar</ion-button>
    <ion-button expand="block" fill="clear" (click)="cancelarForm()">Cancelar</ion-button>
  </div>

  <ion-list>
    <ion-item *ngFor="let treino of treinos">
      <ion-label>
        {{ treino.titulo }} - {{ treino.objetivo }}
      </ion-label>
      <ion-button color="primary" slot="end" (click)="abrirForm(treino)">Editar</ion-button>
      <ion-button color="danger" slot="end" (click)="treino.id && excluirTreino(treino.id)">Excluir</ion-button>
    </ion-item>
  </ion-list>
</ion-content>
