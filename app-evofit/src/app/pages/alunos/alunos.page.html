<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Alunos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-button expand="block" (click)="abrirForm()">Novo Aluno</ion-button>

  <div *ngIf="mostrarForm">
    <ion-item>
      <ion-label position="floating">Nome</ion-label>
      <ion-input [(ngModel)]="novoAluno.nome"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">WhatsApp</ion-label>
      <ion-input [(ngModel)]="novoAluno.whatsapp"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">E-mail</ion-label>
      <ion-input [(ngModel)]="novoAluno.email"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label>Gênero</ion-label>
      <ion-select [(ngModel)]="novoAluno.genero">
        <ion-select-option *ngFor="let g of generos" [value]="g">{{ g }}</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-button expand="block" (click)="cadastrarAluno()">Cadastrar</ion-button>
  </div>

  <ion-list>
    <ion-item *ngFor="let aluno of alunos">
      <ion-label>
        {{ aluno.nome }} - {{ aluno.whatsapp }} - {{ aluno.email }} - {{ aluno.genero }}
      </ion-label>
      <ion-button color="danger" slot="end" (click)="aluno.id && excluirAluno(aluno.id)">
        Excluir
      </ion-button>
    </ion-item>
  </ion-list>

</ion-content>
