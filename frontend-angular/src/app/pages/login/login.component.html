<div class="container">
  <div class="card login-card">
    <h1>Evofit</h1>
    <p>Sistema de gestão para personal trainers</p>

    <h2>Login</h2>

    <input
      type="email"
      placeholder="E-mail"
      [(ngModel)]="email"
    >

    <input
      type="password"
      placeholder="Senha"
      [(ngModel)]="senha"
    >

    <button (click)="entrar()">Entrar</button>

    <p class="erro" *ngIf="erro">{{ erro }}</p>
  </div>
</div>
